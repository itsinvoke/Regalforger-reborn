name: 24/7 Regalforger Bot

on:
  workflow_dispatch:        # manual trigger
  schedule:                 # scheduled restart every 4 h
    - cron: '0 */4 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # ---- enable if you left the secrets under an environment named “.env” ----
    environment: ".env"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "MC_PASSWORD=${{ secrets.MC_PASSWORD }}" >> .env
          echo "MC_USERNAME=${{ secrets.MC_USERNAME }}" >> .env
          echo "WHITELIST=${{ secrets.WHITELIST }}" >> .env
          echo "STASH_X=${{ secrets.STASH_X }}" >> .env
          echo "STASH_Y=${{ secrets.STASH_Y }}" >> .env
          echo "STASH_Z=${{ secrets.STASH_Z }}" >> .env

      - name: Run Regalforger
        run: node index.js
